name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run tests (stdlib only — no install needed)
        working-directory: tests
        run: python -m unittest discover -s . -p "test_*.py" -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - run: ruff check .

  smoke:
    name: end-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Hook produces a lean injection against the template vault
        env:
          ENGRAM_VAULT: ${{ github.workspace }}/vault-template
        run: |
          python3 hooks/session-start.py | python3 -c "import json,sys; c=json.load(sys.stdin)['hookSpecificOutput']['additionalContext']; assert len(c) < 10000, 'injection too large'; print('lean injection OK:', len(c), 'chars')"
      - name: Doctor runs
        env:
          ENGRAM_VAULT: ${{ github.workspace }}/vault-template
        run: python3 scripts/doctor.py || true
